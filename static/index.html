<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./static/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap">
    <title>Git Practice</title>
</head>
<body>
    <section>
        <div class="container">
            <div class="container__center_content">
                <img
                    class="img_logo"
                    src="https://git-scm.com/images/logos/downloads/Git-Logo-2Color.svg"
                    alt="git_logo"
                >
                <h1>Learning Git commands: simple and useful.</h1>
            </div>
            <div class="container__center_content text_button">
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Reprehenderit, adipisci deleniti magni nihil placeat cum voluptate autem tenetur. Magnam tempora distinctio ut! Animi ipsam officiis quod, architecto blanditiis laboriosam sint!</p>
                <button class="button" id="start_btn">Start</button>
            </div>
            <div class="container__center_content question_section_none" id="question_section">
                <p class="question"></p>
                <input type="text" id="answer_input"/>
                <button class="button" id="answer_btn">Check answer</button>
            </div>
        </div>
    </section>
    <script src="./static/script.js"></script>
